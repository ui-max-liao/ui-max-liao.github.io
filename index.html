<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniFi Switch QA Reports</title>
<style>
  :root {
    --bg: #0f1923;
    --card: #1a2733;
    --border: #2a3f50;
    --text: #e0e6ed;
    --text-dim: #8899aa;
    --accent: #0077ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 40px; }
  .reports { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 600px; }
  a.report-card { display: block; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; text-decoration: none; color: var(--text); transition: border-color 0.2s, transform 0.2s; }
  a.report-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .report-card h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .report-card p { color: var(--text-dim); font-size: 13px; }
  .report-card .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; background: rgba(0,119,255,0.12); color: var(--accent); margin-left: 8px; vertical-align: middle; }
</style>
</head>
<body>

<h1>UniFi Switch QA Reports</h1>
<p class="subtitle">Firmware release test reports</p>

<div class="reports">
  <a class="report-card" href="7.5.2-switch-test/">
    <h2>7.5.2 Switch Firmware Test <span class="badge">LATEST</span></h2>
    <p>US.MULT 7.5.2+16967 &bull; 10 test suites &bull; UDME 10.58.150.37 &bull; 2026-04-30</p>
  </a>
</div>

</body>
</html>
